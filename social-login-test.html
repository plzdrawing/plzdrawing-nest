<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>소셜 로그인 테스트</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
      }
      .container {
        max-width: 600px;
        margin: 0 auto;
      }
      .input-group {
        margin-bottom: 20px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }
      input {
        width: 100%;
        padding: 8px;
        margin-bottom: 10px;
        box-sizing: border-box;
      }
      button {
        padding: 10px 20px;
        cursor: pointer;
        font-size: 16px;
        margin-right: 10px;
        border-radius: 4px;
      }
      .google {
        background-color: #db4437;
        color: white;
        border: none;
      }
      .kakao {
        background-color: #fee500;
        color: #000000;
        border: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>소셜 로그인 테스트</h1>
      <div class="input-group">
        <label for="baseUrl">백엔드 배포 URL</label>
        <input
          type="text"
          id="baseUrl"
          placeholder="https://api.example.com"
          value="http://localhost:3000"
        />
        <small style="color: #666"
          >마지막 슬래시(/)는 제외하고 입력해주세요.</small
        >
      </div>

      <button onclick="login('google')" class="google">Google 로그인</button>
      <button onclick="login('kakao')" class="kakao">Kakao 로그인</button>

      <div
        style="
          margin-top: 30px;
          padding: 15px;
          background-color: #f5f5f5;
          border-radius: 4px;
        "
      >
        <h3>테스트 방법</h3>
        <ol>
          <li>
            위 입력창에 <strong>배포된 백엔드 서버의 주소</strong>를 입력하세요.
          </li>
          <li>원하는 소셜 로그인 버튼을 클릭하세요.</li>
          <li>소셜 로그인 인증 페이지로 이동합니다.</li>
          <li>
            로그인이 완료되면 화면에 <strong>Access Token</strong>(JSON 형식)이
            표시됩니다.
          </li>
        </ol>
        <p style="color: red; font-size: 0.9em">
          주의: 배포된 백엔드 환경변수에 설정된 Redirect URI와 실제 호출 주소가
          일치해야 정상 동작합니다.
        </p>
      </div>
    </div>

    <script>
      function login(provider) {
        let baseUrl = document.getElementById('baseUrl').value.trim();

        if (!baseUrl) {
          alert('백엔드 URL을 입력해주세요.');
          return;
        }

        // 끝에 슬래시가 있다면 제거
        baseUrl = baseUrl.replace(/\/$/, '');

        // main.ts에서 app.setGlobalPrefix('api')가 설정되어 있으므로 /api 경로 포함
        const targetUrl = `${baseUrl}/api/auth/${provider}`;

        console.log(`Redirecting to: ${targetUrl}`);
        window.location.href = targetUrl;
      }
    </script>
  </body>
</html>
